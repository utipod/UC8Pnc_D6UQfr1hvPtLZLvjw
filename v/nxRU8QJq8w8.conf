description = "#RUNNINGNEWS #ZOOMFLY5 #NIKE #ALPHAFLY #EDDBUD\n\nNIKE ZOOM FLY 5 RELEASE - ALPHAFLY NEXT %2 RESTOCK - Running News Ep 59\n\nAs always, interesting developments in the world of running!\n\nToday i look at the improved range of running shoes designed specifically for women, the release of the ZOOM FLY 5 and ALPHAFLY NEXT% 2 GENERAL RELEASES, along with a new PUMA SUSTAINiBLE RANGE called FIRST MILE. In addition i discuss the new tech used in the JORDAN 37 which is set to use a double stacked zoom air strobel unit in the forefoot. Could we see that in forthcoming running shoes.\n\nHold tight people, stay strong and we WILL make it through.\n\nKeep it nice in the comments please, i do not do unpleasant, its just ..... unpleasant. See you in the digital ones and zeros......\n\nSubscriber count as of 9/7/2022\n29278\n------------------------------------------------------------------------------------------------------------\n\nJoin this channel to get access to perks:\nhttps://www.youtube.com/channel/UC8Pnc_D6UQfr1hvPtLZLvjw/join\n\nBuy EDDBUD channel merchandise at the link below.\nhttps://teespring.com/en-GB/stores/eddbudstore\n\n------------------------------------------------------------------------------------------------------------\n\nEmail me at:\neddbudshoetube@gmail.com\n\nFollow me on Strava:\nhttps://www.strava.com/athletes/30448518\n\nFollow me on Instagram:\nhttps://www.instagram.com/eddbud/\n\nJoin the EDDBUD Runners United strava group at the link below.\nhttps://www.strava.com/clubs/EDDBUDRUNNERSUNITED\n\nPlease like, share, comment and subscribe. We are building a great community here, and it is down to you the viewers."
