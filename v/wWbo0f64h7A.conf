title = "NIKE ZOOM FLY 5  INITIAL REVIEW - BEST CARBON PLATE TRAINER? - EDDBUD"
description = "#ZOOMFLY5 #NIKE #ZOOMFLY #EDDBUD #RUNNINGSHOES\n\nNIKE ZOOM FLY 5  INITIAL REVIEW - BEST CARBON PLATE TRAINER? - EDDBUD\n\nAn initial review of the recently released NIKE ZOOM FLY 5.\n\nI shoe i have purchased this one with my own cash. No freebies here. As always honest opinions based on experience in the shoe.\n\nThe V4 was a shoe that did not hit the mark for me and i examine the ZOOM FLY 5 today to see if it fits the specification as a popular carbon plate training shoe. ZOOMX here in the midsole, but its nothing new!\n\nMy initial review saw me hitting speeds anywhere from 8:20/mi to about 6:20/mi. It is a wider and more stable shoe compared to the V4, loads of grip and perhaps now a shoe you can say is very much a training model than a race option due to increased weight.\n\nLet me know your thoughts and opinions down in the comments.\n\nJoin this channel to get access to perks:\nhttps://www.youtube.com/channel/UC8Pnc_D6UQfr1hvPtLZLvjw/join\n\nHold tight people, stay strong and we WILL make it through.\n\nKeep it nice in the comments please, i do not do unpleasant, its just ..... unpleasant. See you in the digital ones and zeros......\n\nSubscriber count as of 13/7/2022\n29407\n\n------------------------------------------------------------------------------------------------------------\n\nEmail me at:\neddbudshoetube@gmail.com\n\nFollow me on Strava:\nhttps://www.strava.com/athletes/30448518\n\nFollow me on Instagram:\nhttps://www.instagram.com/eddbud/\n\nJoin the EDDBUD Runners United strava group at the link below.\nhttps://www.strava.com/clubs/EDDBUDRUNNERSUNITED\n\nPlease like, share, comment and subscribe. We are building a great community here, and it is down to you the viewers."
