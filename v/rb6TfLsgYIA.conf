description = "#ASICS10K #LONDON10K #EDDBUD #RACERECAP #ASICS\n\nASICS LONDON 10K 2022 RACE RECAP - EDDBUD - RUNNING SHOE SELECTION and PERFORMANCE ANALYSIS\n\nI was in the capital city of England, Central London for the ASICS LONDON 10K. Here is my race review and recap.\n\nFind out how i got on, the shoes i wore and my thoughts on the race route.\n\nI analyse my performance and give you some race footage to set the scene. How did the ASICS METASPEED SKY+  get on navigating me across the packed and thankfully closed road course of the ASICS LONDON 10K?\nAmazing to see so many viewers and meet lots of awesome runners out there in the serious sunshine. It was a hard session out there and much rest is needed after this one!\n\nHold tight people, stay strong and we WILL make it through.\n\nKeep it nice in the comments please, i do not do unpleasant, its just ..... unpleasant. See you in the digital ones and zeros......\n\nSubscriber count as of 11/7/2022\n29351\n------------------------------------------------------------------------------------------------------------\n\nJoin this channel to get access to perks:\nhttps://www.youtube.com/channel/UC8Pnc_D6UQfr1hvPtLZLvjw/join\n\nBuy EDDBUD channel merchandise at the link below.\nhttps://teespring.com/en-GB/stores/eddbudstore\n\n------------------------------------------------------------------------------------------------------------\n\nEmail me at:\neddbudshoetube@gmail.com\n\nFollow me on Strava:\nhttps://www.strava.com/athletes/30448518\n\nFollow me on Instagram:\nhttps://www.instagram.com/eddbud/\n\nJoin the EDDBUD Runners United strava group at the link below.\nhttps://www.strava.com/clubs/EDDBUDRUNNERSUNITED\n\nPlease like, share, comment and subscribe. We are building a great community here, and it is down to you the viewers."
