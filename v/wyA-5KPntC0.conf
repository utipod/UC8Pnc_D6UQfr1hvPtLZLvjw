description = "#SAUCONY #SPEED3 #ENDORPHINSPEED3 #EDDBUD #SPEED3REVIEW\n\nSAUCONY ENDORPHIN SPEED 3 REVIEW | STILL THE BEST ALL ROUND RUNNING SHOE ON THE MARKET? | EDDBUD\n\nI gave the original Saucony Endorphin Speed a 11.2/12 back in 2020, it was a wondrous, versatile and very nimble shoe. The V2 was similar but not quite the shoe we had in the V1. \n\nHow does this new version 3 stack up against the original and V2? I examine the upper, midsole and outsole along with perceived value of the shoe and give you my thoughts after 10 miles or 16km.\n\nA wider landing platform and improved outsole mean it is good news! An Ian Botham of running shoes.\n\nLet me know your thoughts on the shoe down in the comments section.\n\nHold tight people, stay strong and we WILL make it through.\n\nKeep it nice in the comments please, i do not do unpleasant, its just ..... unpleasant. See you in the digital ones and zeros......\n\nSubscriber count as of 7/7/2022\n29220\n------------------------------------------------------------------------------------------------------------\n\nJoin this channel to get access to perks:\nhttps://www.youtube.com/channel/UC8Pnc_D6UQfr1hvPtLZLvjw/join\n\nBuy EDDBUD channel merchandise at the link below.\nhttps://teespring.com/en-GB/stores/eddbudstore\n\nEmail me at:\neddbudshoetube@gmail.com\n\nFollow me on Strava:\nhttps://www.strava.com/athletes/30448518\n\nFollow me on Instagram:\nhttps://www.instagram.com/eddbud/\n\nJoin the EDDBUD Runners United strava group at the link below.\nhttps://www.strava.com/clubs/EDDBUDRUNNERSUNITED\n\nPlease like, share, comment and subscribe. We are building a great community here, and it is down to you the viewers."
