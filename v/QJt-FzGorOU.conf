description = "#ZOOMFLY5 #NIKE #ZOOMX #EDDBUD #RUNNINGSHOES\n\nNIKE ZOOM FLY 5 VS THE REST | ADIDAS BOSTON 10, INVINCIBLE RUN FK 2, ENDORPHIN SPEED 3 & MAGIC SPEED\n\nJoin this channel to get access to perks:\nhttps://www.youtube.com/channel/UC8Pnc_D6UQfr1hvPtLZLvjw/join\n\nToday another video in the VS THE REST series, a new type of comparison, one running shoe in an out and out battle against many others!\n\nI have received loads of requests for comparisons of the NIKE ZOOM FLY 5 vs lots of other models. I shall work my way through the 2021/2022 shoes to give a real feel for how it shapes up.\n\nFeatured today are the following.\n\nASICS MAGIC SPEED\nNIKE ZOOMX INVINCIBLE RUN FK 2\nADIDAS ADIZERO BOSTON 10\nSAUCONY ENDORPHIN SPEED 3\n\nWhat have you made of the NIKE ZOOM FLY 5 so far? Is it an upgrade or are there too many differences for it to be an option for you?\n\nHold tight people, stay strong and we WILL make it through.\n\nKeep it nice in the comments please, i do not do unpleasant, its just ..... unpleasant. See you in the digital ones and zeros......\n\nSubscriber count as of 14/7/2022\n29462\n------------------------------------------------------------------------------------------------------------\nEmail me at:\neddbudshoetube@gmail.com\n\nFollow me on Strava:\nhttps://www.strava.com/athletes/30448518\n\nFollow me on Instagram:\nhttps://www.instagram.com/eddbud/\n\nJoin the EDDBUD Runners United strava group at the link below.\nhttps://www.strava.com/clubs/EDDBUDRUNNERSUNITED\n\nPlease like, share, comment and subscribe. We are building a great community here, and it is down to you the viewers."
